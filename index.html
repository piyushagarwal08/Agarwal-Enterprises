    <script type="text/babel">
        const App = () => {
            const [selectedCategory, setSelectedCategory] = React.useState('All');
            const [cart, setCart] = React.useState([]);
            const [address, setAddress] = React.useState('');
            const [showCart, setShowCart] = React.useState(false);
            const [showContact, setShowContact] = React.useState(false);
            const [showAdmin, setShowAdmin] = React.useState(false);
            const [products, setProducts] = React.useState([]);
            const [categories, setCategories] = React.useState(['All']);
            const [searchTerm, setSearchTerm] = React.useState('');
            const [loading, setLoading] = React.useState(true);
            const [isAdminLoggedIn, setIsAdminLoggedIn] = React.useState(false);
            const [adminPassword, setAdminPassword] = React.useState('');
            const [showPasswordPrompt, setShowPasswordPrompt] = React.useState(false);
            const adminTapRef = React.useRef({ count: 0, timer: null });

            // --- Single / Bulk update feature state ---
            const [updateMode, setUpdateMode] = React.useState('single'); // 'single' | 'bulk'
            const [productSearch, setProductSearch] = React.useState('');
            const [selectedProductId, setSelectedProductId] = React.useState(null);
            const [dropdownOpen, setDropdownOpen] = React.useState(false);
            const [editMrp, setEditMrp] = React.useState('');
            const [editOfferPrice, setEditOfferPrice] = React.useState('');
            const [editStock, setEditStock] = React.useState('');

            const ADMIN_PASSWORD = 'admin123';

            // The 10 canonical categories (from products.json) that must ALWAYS show as filters
            const CANONICAL_CATEGORIES = [
                'Ayurvedic Medicines',
                'Body & Bath Care',
                'Grocery & Staples',
                'Hair Care',
                'Health Supplements & Wellness',
                'Oral Care',
                'Packaged Foods & Beverages',
                'Pooja & Household',
                'Skin & Face Care',
                'Spices & Cooking Essentials'
            ];

            // Build the filter list: the 10 canonical categories are always present,
            // plus any extra categories found in the current products, sorted.
            const mergeCats = (productsList) =>
                [...new Set([...CANONICAL_CATEGORIES, ...productsList.map(p => p.category || 'Other')])].sort();

            React.useEffect(() => {
                const loadProducts = async () => {
                    // Read products.json once — gives us the canonical category list AND a file fallback
                    let canonicalCats = CANONICAL_CATEGORIES.slice();
                    let fileProducts = [];
                    try {
                        const resp = await fetch('products.json?t=' + Date.now());
                        const fileData = await resp.json();
                        fileProducts = Array.isArray(fileData) ? fileData : (fileData.products || []);
                        const fileCats = [...new Set(fileProducts.map(p => p.category || 'Other'))];
                        if (fileCats.length) canonicalCats = fileCats;
                    } catch (e) {
                        console.log('products.json not read; using built-in category list');
                    }

                    const applyProducts = (productsList) => {
                        setProducts(productsList);
                        const merged = [...new Set([...canonicalCats, ...productsList.map(p => p.category || 'Other')])].sort();
                        setCategories(['All', ...merged]);
                    };
                    const saveLocal = (productsList) => {
                        localStorage.setItem('agarwal_products', JSON.stringify({
                            products: productsList,
                            categories: [...new Set(productsList.map(p => p.category || 'Other'))].sort()
                        }));
                    };

                    // Ensure Firebase has the canonical categories stored (add if required) — fire & forget
                    if (window.firebaseDb) {
                        (async () => {
                            try {
                                const snap = await window.firebaseDb.ref('categories').once('value');
                                const raw = snap.exists() ? snap.val() : [];
                                const existing = Array.isArray(raw) ? raw : Object.values(raw || {});
                                const merged = [...new Set([...existing, ...canonicalCats])].sort();
                                if (merged.length !== existing.length) {
                                    await window.firebaseDb.ref('categories').set(merged);
                                    console.log('✅ Canonical categories added to Firebase');
                                }
                            } catch (e) {
                                console.log('Category sync to Firebase skipped:', e.message);
                            }
                        })();
                    }

                    try {
                        // PRIORITY 1: Firebase FIRST on every device (latest cross-device data)
                        if (window.firebaseDb) {
                            let fbReadOk = false, fbList = null;
                            try {
                                const snapshot = await new Promise((resolve, reject) => {
                                    const timeout = setTimeout(() => reject(new Error('Firebase timeout')), 5000);
                                    window.firebaseDb.ref('products').once('value', (snap) => {
                                        clearTimeout(timeout);
                                        resolve(snap);
                                    }, (error) => {
                                        clearTimeout(timeout);
                                        reject(error);
                                    });
                                });
                                fbReadOk = true;
                                if (snapshot.exists()) {
                                    const val = snapshot.val();
                                    fbList = Array.isArray(val) ? val.filter(Boolean) : Object.values(val);
                                }
                            } catch (error) {
                                console.log('Firebase read failed, will try local/file:', error.message);
                            }

                            if (fbList && fbList.length) {
                                applyProducts(fbList);
                                saveLocal(fbList); // keep this device's copy in sync
                                console.log('✅ Loaded products from Firebase (latest, cross-device)');
                                return;
                            }

                            // Firebase reachable but empty -> seed it from the file (first-run setup)
                            if (fbReadOk && fileProducts.length) {
                                applyProducts(fileProducts);
                                saveLocal(fileProducts);
                                try {
                                    await window.firebaseDb.ref('products').set(fileProducts);
                                    console.log('✅ Seeded Firebase from products.json');
                                } catch (e) {

                const mrpVal = editMrp === '' ? target.mrp : parseFloat(editMrp);

                const stockVal = editStock === '' ? target.stock : parseInt(editStock, 10);

                if ((editMrp !== '' && (isNaN(mrpVal) || mrpVal < 0)) ||

                        localStorage.setItem('agarwal_products', JSON.stringify({

                                }
                            } catch (error) {
                                alert(`✅ Updated ${updatedCount} products locally!\n\n⚠️ Firebase sync failed: ${error.message}\n\nChanges saved in browser.`);
                            }
                            setShowAdmin(false);
                        };
                        
                        saveToFirebase();

                                const timeout = setTimeout(() => reject(new Error('Firebase timeout')), 5000);
                                window.firebaseDb.ref('products').once('value', (snap) => {
                                    clearTimeout(timeout); resolve(snap);

                            }

                            console.log('Firebase refresh failed, trying localStorage:', e.message);
                        }

                            const productsList = Array.isArray(parsed) ? parsed : (parsed.products || []);
                            if (productsList.length) { applyList(productsList, 'this device'); return; }
                        } catch (e) { /* fall through */ }
                    }

                    // Step 3: Fallback: original file (only when nothing has ever been saved)

                    const data = await response.json();
                    const productsList = Array.isArray(data) ? data : (data.products || []);

                    applyList(productsList, 'products.json file');

                }
            };

                                    <button className="modal-close" onClick={() => setShowPasswordPrompt(false)}>✕</button>
                                </div>

                                <form onSubmit={handlePasswordSubmit} className="password-form">
                                    <div className="form-group">
                                        <label>Admin Password:</label>
                                        <input
                                            type="password"
                                            value={adminPassword}
                                            onChange={(e) => setAdminPassword(e.target.value)}
                                            placeholder="Enter your admin password"
                                            autoFocus
                                        />
                                    </div>
                                    <div className="form-group">
                                        <button type="submit">Unlock Admin Panel</button>
                                    </div>
                                </form>

                                <div className="tip-box">
                                    <strong>💡 Tip:</strong> Keyboard Shortcut: Win + Alt + A
                                </div>
                            </div>
                        </div>
                    )}

                    {showAdmin && isAdminLoggedIn && (
                        <div className="modal-overlay" onClick={() => setShowAdmin(false)}>
                            <div className="modal-content" onClick={(e) => e.stopPropagation()}>
                                <div className="modal-header">
                                    <h2>Update Prices & Stock</h2>
                                    <button className="modal-close" onClick={() => setShowAdmin(false)}>✕</button>
                                </div>

                                <div className="mode-toggle">
                                    <button
                                        className={updateMode === 'single' ? 'active' : ''}
                                        onClick={() => { setUpdateMode('single'); }}
                                    >
                                        ✏️ Single Update
                                    </button>
                                    <button
                                        className={updateMode === 'bulk' ? 'active' : ''}
                                        onClick={() => { setUpdateMode('bulk'); setDropdownOpen(false); }}
                                    >
                                        📦 Bulk Update (CSV)
                                    </button>
                                </div>

                                {updateMode === 'single' && (
                                    <div className="upload-section">
                                        <label>Select a product</label>
                                        <p style={{ fontSize: '12px', color: '#6B7280', marginBottom: '8px' }}>
                                            Type to search, tap a product, then update its price and/or stock.
                                        </p>

                                        <div className="combo-wrap">
                                            <input
                                                type="text"
                                                className="combo-input"
                                                placeholder="🔍 Search products..."
                                                value={productSearch}
                                                onFocus={() => setDropdownOpen(true)}
                                                onBlur={() => setTimeout(() => setDropdownOpen(false), 150)}
                                                onChange={(e) => {
                                                    setProductSearch(e.target.value);
                                                    setSelectedProductId(null);
                                                    setDropdownOpen(true);
                                                }}
                                            />
                                            {dropdownOpen && (
                                                <div className="combo-list">
                                                    {dropdownMatches.length === 0 ? (
                                                        <div className="combo-empty">No products match "{productSearch}"</div>
                                                    ) : (
                                                        dropdownMatches.map(p => (
                                                            <div
                                                                key={p.id}
                                                                className="combo-item"
                                                                onMouseDown={(e) => { e.preventDefault(); selectProductForEdit(p); }}
                                                            >
                                                                {p.name}
                                                                <span className="ci-cat">{p.category || 'Other'} · ₹{p.offer_price || p.mrp} · {p.stock} in stock</span>
                                                            </div>
                                                        ))
                                                    )}
                                                </div>
                                            )}
                                        </div>

                                        {selectedProductId && (
                                            <>
                                                <div className="selected-chip">
                                                    ✅ {products.find(p => p.id === selectedProductId)?.name}
                                                </div>

                                                <div className="edit-grid">
                                                    <div className="edit-field">
                                                        <label>MRP (₹)</label>
                                                        <input
                                                            type="number"
                                                            inputMode="decimal"
                                                            value={editMrp}
                                                            onChange={(e) => setEditMrp(e.target.value)}
                                                        />
                                                    </div>
                                                    <div className="edit-field">
                                                        <label>Offer (₹)</label>
                                                        <input
                                                            type="number"
                                                            inputMode="decimal"
                                                            value={editOfferPrice}
                                                            onChange={(e) => setEditOfferPrice(e.target.value)}
                                                        />
                                                    </div>
                                                    <div className="edit-field">
                                                        <label>Stock</label>
                                                        <input
                                                            type="number"
                                                            inputMode="numeric"
                                                            value={editStock}
                                                            onChange={(e) => setEditStock(e.target.value)}
                                                        />
                                                    </div>
                                                </div>

                                                <button className="save-single-btn" onClick={handleSingleUpdate}>
                                                    💾 Save Update
                                                </button>
                                                <button
                                                    className="admin-btn"
                                                    style={{ width: '100%', marginTop: '8px', background: '#9CA3AF' }}
                                                    onClick={resetSingleForm}
                                                >
                                                    Cancel
                                                </button>
                                            </>
                                        )}
                                    </div>
                                )}

                                {updateMode === 'bulk' && (
                                    <>
                                        <div className="upload-section">
                                            <label>Upload CSV with Price & Stock Updates</label>
                                            <p style={{ fontSize: '12px', color: '#6B7280', marginBottom: '8px' }}>
                                                CSV columns: name, category, mrp, offer_price, stock
                                            </p>
                                            <input
                                                type="file"
                                                accept=".csv"
                                                className="file-input"
                                                onChange={handleCSVUpload}
                                            />
                                        </div>

                                        <div className="upload-section" style={{ marginTop: '1rem' }}>
                                            <label>Refresh Latest Data</label>
                                            <p style={{ fontSize: '12px', color: '#6B7280', marginBottom: '8px' }}>
                                                Reloads the most recent saved data — including your latest CSV rate updates — from Firebase, syncing this device with the newest prices and stock.
                                            </p>
                                            <button className="admin-btn" style={{ width: '100%' }} onClick={handleRefreshLatest}>
                                                🔄 Refresh Latest Data
                                            </button>
                                        </div>

                                        <div className="upload-section" style={{ marginTop: '1.5rem', paddingTop: '1rem', borderTop: '1px dashed #E5E7EB' }}>
                                            <label style={{ color: '#B91C1C' }}>Danger: Reset to Original File</label>
                                            <p style={{ fontSize: '12px', color: '#6B7280', marginBottom: '8px' }}>
                                                Discards ALL CSV updates and single edits, restoring the original products.json on every device. Use only to recover from corrupted data.
                                            </p>
                                            <button
                                                className="admin-btn"
                                                style={{ width: '100%', background: '#EF4444' }}
                                                onClick={handleReloadFromFile}
                                            >
                                                ♻️ Reset to original products.json
                                            </button>
                                        </div>
                                    </>
                                )}

                                <div>
                                    <h3 style={{ fontSize: '16px', marginTop: '1.5rem', marginBottom: '1rem', color: '#1F2937' }}>
                                        Current Prices & Stock ({products.length} products)
                                    </h3>
                                    <table className="price-table">
                                        <thead>
                                            <tr>
                                                <th>Product</th>
                                                <th>MRP</th>
                                                <th>Offer Price</th>
                                                <th>Stock</th>
                                            </tr>
                                        </thead>
                                        <tbody>
                                            {products.slice(0, 20).map(product => (
                                                <tr key={product.id}>
                                                    <td style={{ fontSize: '11px' }}>{product.name.substring(0, 20)}...</td>
                                                    <td>₹{product.mrp}</td>
                                                    <td>₹{product.offer_price || product.mrp}</td>
                                                    <td>{product.stock} units</td>
                                                </tr>
                                            ))}
                                        </tbody>
                                    </table>
                                    <p style={{ fontSize: '12px', color: '#6B7280', marginTop: '1rem', textAlign: 'center' }}>
                                        Showing first 20 of {products.length} products
                                    </p>
                                </div>
                            </div>
                        </div>
                    )}
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
