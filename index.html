<body>
    <div id="root"></div>

    <script type="text/babel">
        const App = () => {
            const [selectedCategory, setSelectedCategory] = React.useState('All');
            const [cart, setCart] = React.useState([]);
            const [address, setAddress] = React.useState('');
            const [showCart, setShowCart] = React.useState(false);
            const [showAdmin, setShowAdmin] = React.useState(false);
            const [products, setProducts] = React.useState([]);
            const [categories, setCategories] = React.useState(['All']);
            const [searchTerm, setSearchTerm] = React.useState('');
            const [loading, setLoading] = React.useState(true);
            const [isAdminLoggedIn, setIsAdminLoggedIn] = React.useState(false);
            const [adminPassword, setAdminPassword] = React.useState('');
            const [showPasswordPrompt, setShowPasswordPrompt] = React.useState(false);

            const ADMIN_PASSWORD = 'admin123';

            React.useEffect(() => {
                const loadProducts = async () => {
                    try {
                        // PRIORITY 1: Check localStorage (CSV updates take priority)
                        const savedData = localStorage.getItem('agarwal_products');
                        if (savedData) {
                            try {
                                const parsed = JSON.parse(savedData);
                                const productsList = Array.isArray(parsed) ? parsed : (parsed.products || []);
                                if (productsList.length > 0) {
                                    setProducts(productsList);
                                    const uniqueCategories = [...new Set(productsList.map(p => p.category || 'Other'))];
                                    setCategories(['All', ...uniqueCategories.sort()]);
                                    console.log('✅ Loaded products from localStorage (CSV updates preserved)');
                                    return;
                                }
                            } catch (e) {
                                console.log('localStorage data invalid, trying Firebase');
                            }
                        }
                        
                        // PRIORITY 2: Load from Firebase (cross-device sync)
                        if (window.firebaseDb) {
                            try {
                                const snapshot = await window.firebaseDb.ref('products').get();
                                if (snapshot.exists()) {
                                    const productsList = snapshot.val();
                                    setProducts(productsList);
                                    const uniqueCategories = [...new Set(productsList.map(p => p.category || 'Other'))];
                                    setCategories(['All', ...uniqueCategories.sort()]);
                                    console.log('✅ Loaded products from Firebase (real-time synced)');
                                    return;
                                }
                            } catch (error) {
                                console.log('Firebase not available, trying products.json');
                            }
                        }
                        
                        // PRIORITY 3: Fallback to products.json file
                        const response = await fetch('products.json');
                        const data = await response.json();
                        const productsList = Array.isArray(data) ? data : (data.products || []);
                        
                        setProducts(productsList);
                        
                        const uniqueCategories = [...new Set(productsList.map(p => p.category || 'Other'))];
                        setCategories(['All', ...uniqueCategories.sort()]);
                        console.log('✅ Loaded products from products.json');
                    } catch (error) {
                        console.error('Error loading products:', error);
                        alert('Products not loaded. Using sample data.');
                        const sampleProducts = [
                            { id: 1, name: 'PAT NUTRELA ORG OMEGA 3 6 7 9', category: 'Patanjali Nutrela', mrp: 551, offer_price: 499, stock: 55 },
                            { id: 2, name: 'PAPAD KALI MIRCH - T', category: 'PAPAD', mrp: 55, offer_price: 49, stock: 16 },
                            { id: 3, name: 'CHANA DAL 500 GM (R1)', category: 'PULSES', mrp: 65, offer_price: 59, stock: 6 },
                            { id: 4, name: 'MOONG SABUT 500 GM (R1)', category: 'PULSES', mrp: 80, offer_price: 72, stock: 6 },
                            { id: 5, name: 'RICE BRAN OIL 1 LTR (B) - T', category: 'RICE BRAN OIL', mrp: 180, offer_price: 162, stock: 15 },
                            { id: 6, name: 'VIRGIN COCONUT OIL 500 ML (B) - T', category: 'VIRGIN COCONUT OIL', mrp: 365, offer_price: 329, stock: 17 },
                            { id: 7, name: 'POHA 500 GM -T', category: 'POHA', mrp: 45, offer_price: 40, stock: 7 },
                            { id: 8, name: 'VERMICELLI ROASTED 400 GM - T', category: 'VERMICELLI', mrp: 45, offer_price: 40, stock: 30 },
                            { id: 9, name: 'SESAME OIL 1 L (B)-T', category: 'SESAME OIL', mrp: 260, offer_price: 234, stock: 12 },
                            { id: 10, name: 'KALA NAMAK 200 GM - T', category: 'NAMAK', mrp: 15, offer_price: 13, stock: 112 },
                        ];
                        setProducts(sampleProducts);
                        setCategories(['All', 'Patanjali Nutrela', 'PAPAD', 'PULSES', 'RICE BRAN OIL', 'VIRGIN COCONUT OIL', 'POHA', 'VERMICELLI', 'SESAME OIL', 'NAMAK']);
                    } finally {
                        setLoading(false);
                    }
                };

                loadProducts();

                // KEYBOARD SHORTCUT: Win+Alt+A
                const handleKeyPress = (e) => {
                    if (e.metaKey && e.altKey && (e.key === 'a' || e.key === 'A')) {
                        e.preventDefault();
                        setShowPasswordPrompt(true);
                        console.log('Admin shortcut triggered!');
                    }
                };
                
                window.addEventListener('keydown', handleKeyPress);
                return () => window.removeEventListener('keydown', handleKeyPress);
            }, []);

            const handleAdminClick = () => {
                if (isAdminLoggedIn) {
                    setShowAdmin(true);
                } else {
                    setShowPasswordPrompt(true);
                }
            };

            const handlePasswordSubmit = (e) => {
                e.preventDefault();
                if (adminPassword === ADMIN_PASSWORD) {
                    setIsAdminLoggedIn(true);
                    setShowAdmin(true);
                    setShowPasswordPrompt(false);
                    setAdminPassword('');
                    alert('✅ Welcome! Admin panel unlocked.');
                } else {
                    alert('❌ Incorrect password. Try again!');
                    setAdminPassword('');
                }
            };

            const handleAdminLogout = () => {
                setIsAdminLoggedIn(false);
                setShowAdmin(false);
                setAdminPassword('');
            };

            const filteredProducts = React.useMemo(() => {
                return products.filter(product => {
                    const matchesCategory = selectedCategory === 'All' || (product.category === selectedCategory);
                    const matchesSearch = product.name.toLowerCase().includes(searchTerm.toLowerCase()) ||
                                         (product.category && product.category.toLowerCase().includes(searchTerm.toLowerCase()));
                    return matchesCategory && matchesSearch;
                });
            }, [products, selectedCategory, searchTerm]);

            const addToCart = (product) => {
                const existing = cart.find(item => item.id === product.id);
                if (existing) {
                    setCart(cart.map(item =>
                        item.id === product.id ? { ...item, qty: item.qty + 1 } : item
                    ));
                } else {
                    setCart([...cart, { ...product, qty: 1 }]);
                }
            };

            const removeFromCart = (id) => {
                setCart(cart.filter(item => item.id !== id));
            };

            const updateQty = (id, qty) => {
                if (qty <= 0) {
                    removeFromCart(id);
                } else {
                    setCart(cart.map(item =>
                        item.id === id ? { ...item, qty } : item
                    ));
                }
            };

            const total = cart.reduce((sum, item) => sum + ((item.offer_price || item.mrp) * item.qty), 0);

            const generateWhatsAppMessage = () => {
                let message = `*Order from Patanjali Mega Store (Jagatpura)*\n\n`;
                cart.forEach(item => {
                    message += `${item.name} - ₹${item.offer_price} x ${item.qty} = ₹${item.offer_price * item.qty}\n`;
                });
                message += `\n*Total: ₹${total}*\n`;
                if (address) message += `\n*Delivery Address:*\n${address}`;
                const encoded = encodeURIComponent(message);
                window.open(`https://wa.me/917300076573?text=${encoded}`, '_blank');
            };

            const handleCSVUpload = (event) => {
                const file = event.target.files[0];
                if (!file) return;

                Papa.parse(file, {
                    header: true,
                    complete: (results) => {
                        let updatedCount = 0;
                        const updatedProducts = products.map(product => {
                            const csvRow = results.data.find(row => 
                                row.name && row.name.trim().toLowerCase() === product.name.toLowerCase()
                            );
                            if (csvRow) {
                                updatedCount++;
                                return {
                                    ...product,
                                    name: csvRow.name ? csvRow.name : product.name,
                                    category: csvRow.category ? csvRow.category : product.category,
                                    mrp: csvRow.mrp ? parseFloat(csvRow.mrp) : product.mrp,
                                    offer_price: csvRow.offer_price ? parseFloat(csvRow.offer_price) : (product.offer_price || product.mrp),
                                    stock: csvRow.stock ? parseInt(csvRow.stock) : product.stock
                                };
                            }
                            return product;
                        });
                        
                        setProducts(updatedProducts);
                        
                        // Regenerate categories from updated products
                        const uniqueCategories = [...new Set(updatedProducts.map(p => p.category || 'Other'))];
                        setCategories(['All', ...uniqueCategories.sort()]);
                        setSelectedCategory('All');
                        
                        // Save to localStorage (immediate)
                        // Save to localStorage (immediate)
                        localStorage.setItem('agarwal_products', JSON.stringify({
                            products: updatedProducts,
                            categories: uniqueCategories.sort()
                        }));
                        
                        // Save to Firebase (cross-device sync)
                        const saveToFirebase = async () => {
                            try {
                                if (window.firebaseDb) {
                                    await window.firebaseDb.ref('products').set(updatedProducts);
                                    alert(`✅ Updated ${updatedCount} products!\n\n✅ FIREBASE SYNCED!\n\nAll devices now see updated prices!\n\nTime: ${new Date().toLocaleString()}`);
                                } else {
                                    alert(`✅ Updated ${updatedCount} products locally!\n\n⚠️ Firebase not configured.\nChanges saved in localStorage.\n\nConfigure Firebase for cross-device sync.`);
                                }
                            } catch (error) {
                                alert(`✅ Updated ${updatedCount} products locally!\n\n⚠️ Firebase sync failed: ${error.message}\n\nChanges saved in browser.`);
                            }
                            setShowAdmin(false);
                        };
                        
                        saveToFirebase();
                    },
                    error: (err) => {
                        alert('Error parsing CSV: ' + err.message);
                    }
                });
            };

            return (
                <div style={{ minHeight: '100vh', background: 'linear-gradient(135deg, #F0FDF4 0%, #F3F4F6 100%)' }}>
                    <div className="header">
                        <h1>🌿 Patanjali Mega Store (Jagatpura)</h1>
                        <p>Khasra No. 500/356 (Middle), Near KS Petrol Pump,</p>
                        <p>Near Mahima City Ville, Karolan Ka Barh, Jagatpura, Jaipur - 302017</p>
                        <p style={{ marginTop: '0.5rem', fontStyle: 'italic', fontWeight: '500' }}>Authentic Patanjali Products, Delivered with Trust.</p>
                    </div>

                    <div className="top-nav">
                        <input
                            type="text"
                            className="search-box"
                            placeholder="🔍 Search products..."
                            value={searchTerm}
                            onChange={(e) => setSearchTerm(e.target.value)}
                        />
                        {isAdminLoggedIn && (
                            <button className="admin-btn" onClick={handleAdminClick}>
                                ⚙️ Update Prices
                            </button>
                        )}
                        {isAdminLoggedIn && (
                            <button className="admin-btn logout" onClick={handleAdminLogout}>
                                Logout
                            </button>
                        )}
                    </div>

                    {loading ? (
                        <div className="no-results">Loading products...</div>
                    ) : (
                        <>
                            <div className="categories">
                                {categories.map(cat => (
                                    <button
                                        key={cat}
                                        className={`category-btn ${selectedCategory === cat ? 'active' : ''}`}
                                        onClick={() => {
                                            setSelectedCategory(cat);
                                            setSearchTerm('');
                                        }}
                                    >
                                        {cat}
                                    </button>
                                ))}
                            </div>

                            <div className="products-container">
                                {filteredProducts.length === 0 ? (
                                    <div className="no-results">
                                        <p>No products found matching your search.</p>
                                    </div>
                                ) : (
                                    <div className="products-grid">
                                        {filteredProducts.map(product => {
                                            const offerPrice = product.offer_price || product.mrp;
                                            const showDiscount = offerPrice !== product.mrp;
                                            
                                            return (
                                            <div key={product.id} className="product-card">
                                                <h3>{product.name}</h3>
                                                <div className="price-info">
                                                    {showDiscount ? (
                                                        <span className="mrp-price">MRP: ₹{product.mrp}</span>
                                                    ) : (
                                                        <span></span>
                                                    )}
                                                    <span className="stock-badge">Stock: {product.stock}</span>
                                                </div>
                                                <div className="product-footer">
                                                    {showDiscount ? (
                                                        <p className="offer-price">₹{offerPrice}</p>
                                                    ) : (
                                                        <p className="offer-price">₹{product.mrp}</p>
                                                    )}
                                                    <button 
                                                        className="add-btn" 
                                                        onClick={() => addToCart(product)}
                                                        disabled={product.stock === 0}
                                                    >
                                                        Add +
                                                    </button>
                                                </div>
                                            </div>
                                            );
                                        })}
                                    </div>
                                )}
                            </div>
                        </>
                    )}

                    {cart.length > 0 && (
                        <button className="cart-fab" onClick={() => setShowCart(!showCart)}>
                            🛒
                            <span className="cart-badge">{cart.length}</span>
                        </button>
                    )}

                    {showCart && (
                        <div className="cart-panel">
                            <div className="cart-header">
                                <h2>Your Order</h2>
                                <button className="close-btn" onClick={() => setShowCart(false)}>✕</button>
                            </div>

                            {cart.length === 0 ? (
                                <p className="empty-cart">Cart is empty</p>
                            ) : (
                                <>
                                    <div className="cart-content">
                                        {cart.map(item => {
                                            const offerPrice = item.offer_price || item.mrp;
                                            return (
                                            <div key={item.id} className="cart-item">
                                                <div className="item-details">
                                                    <h4>{item.name}</h4>
                                                    <p>₹{offerPrice} each</p>
                                                </div>
                                                <div className="qty-controls">
                                                    <button className="qty-btn" onClick={() => updateQty(item.id, item.qty - 1)}>−</button>
                                                    <span className="qty-display">{item.qty}</span>
                                                    <button className="qty-btn" onClick={() => updateQty(item.id, item.qty + 1)}>+</button>
                                                    <p className="item-price">₹{offerPrice * item.qty}</p>
                                                </div>
                                            </div>
                                            );
                                        })}
                                    </div>

                                    <div className="address-section">
                                        <label className="address-label">Delivery Address</label>
                                        <textarea
                                            className="address-input"
                                            value={address}
                                            onChange={(e) => setAddress(e.target.value)}
                                            placeholder="Enter your full address..."
                                        />
                                    </div>

                                    <div className="footer">
                                        <div className="total-line">
                                            <span>Total:</span>
                                            <span className="total-amount">₹{total}</span>
                                        </div>
                                        <p className="footer-note">💬 Order confirmation will come via WhatsApp</p>
                                        <button
                                            className="whatsapp-btn"
                                            onClick={generateWhatsAppMessage}
                                            disabled={!address}
                                        >
                                            📱 Order via WhatsApp
                                        </button>
                                    </div>
                                </>
                            )}
                        </div>
                    )}

                    {showPasswordPrompt && (
                        <div className="modal-overlay" onClick={() => setShowPasswordPrompt(false)}>
                            <div className="modal-content" onClick={(e) => e.stopPropagation()}>
                                <div className="modal-header">
                                    <h2>🔒 Admin Login</h2>
                                    <button className="modal-close" onClick={() => setShowPasswordPrompt(false)}>✕</button>
                                </div>

                                <form onSubmit={handlePasswordSubmit} className="password-form">
                                    <div className="form-group">
                                        <label>Admin Password:</label>
                                        <input
                                            type="password"
                                            value={adminPassword}
                                            onChange={(e) => setAdminPassword(e.target.value)}
                                            placeholder="Enter your admin password"
                                            autoFocus
                                        />
                                    </div>
                                    <div className="form-group">
                                        <button type="submit">Unlock Admin Panel</button>
                                    </div>
                                </form>

                                <div className="tip-box">
                                    <strong>💡 Tip:</strong> Keyboard Shortcut: Win + Alt + A
                                </div>
                            </div>
                        </div>
                    )}

                    {showAdmin && isAdminLoggedIn && (
                        <div className="modal-overlay" onClick={() => setShowAdmin(false)}>
                            <div className="modal-content" onClick={(e) => e.stopPropagation()}>
                                <div className="modal-header">
                                    <h2>Update Prices & Stock</h2>
                                    <button className="modal-close" onClick={() => setShowAdmin(false)}>✕</button>
                                </div>

                                <div className="upload-section">
                                    <label>Upload CSV with Price & Stock Updates</label>
                                    <p style={{ fontSize: '12px', color: '#6B7280', marginBottom: '8px' }}>
                                        CSV columns: name, category, mrp, offer_price, stock
                                    </p>
                                    <input
                                        type="file"
                                        accept=".csv"
                                        className="file-input"
                                        onChange={handleCSVUpload}
                                    />
                                </div>

                                <div>
                                    <h3 style={{ fontSize: '16px', marginTop: '1.5rem', marginBottom: '1rem', color: '#1F2937' }}>
                                        Current Prices & Stock ({products.length} products)
                                    </h3>
                                    <table className="price-table">
                                        <thead>
                                            <tr>
                                                <th>Product</th>
                                                <th>MRP</th>
                                                <th>Offer Price</th>
                                                <th>Stock</th>
                                            </tr>
                                        </thead>
                                        <tbody>
                                            {products.slice(0, 20).map(product => (
                                                <tr key={product.id}>
                                                    <td style={{ fontSize: '11px' }}>{product.name.substring(0, 20)}...</td>
                                                    <td>₹{product.mrp}</td>
                                                    <td>₹{product.offer_price || product.mrp}</td>
                                                    <td>{product.stock} units</td>
                                                </tr>
                                            ))}
                                        </tbody>
                                    </table>
                                    <p style={{ fontSize: '12px', color: '#6B7280', marginTop: '1rem', textAlign: 'center' }}>
                                        Showing first 20 of {products.length} products
                                    </p>
                                </div>
                            </div>
                        </div>
                    )}
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
